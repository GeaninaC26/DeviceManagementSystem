<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">
      <h3 class="navbar-title">{{ appTitle }}</h3>
    </div>
    <ng-container *ngIf="currentUser()">
      <div class="navbar-center">
        <div class="app-activity">
          @if (currentUser()?.role === 1) {
            <span class="activity-icon">⚙️</span>
            <span class="activity-text">Administrator</span>
          } @else {
            <span class="activity-icon">📱</span>
            <span class="activity-text">My Devices</span>
          }
        </div>
      </div>
      <div class="navbar-menu">
        @if (currentUser().role === 1) {
          <span class="navbar-user"
            >{{ currentUser()?.name }} ({{ roleLabel(currentUser()?.role) }})</span
          >
        } @else {
          <span class="navbar-user">{{ currentUser()?.name }} </span>
        }
        <button type="button" class="btn btn-primary" (click)="logout()">Logout</button>
      </div>
    </ng-container>
  </div>
</nav>
