<div class="device-management">
  <div class="device-management-layout">
    <div class="device-list-panel">
      <div class="device-search">
        <input type="text" class="device-search-input" [value]="deviceSearchText()"
          (input)="onDeviceSearchTextChange($event.target.value)" placeholder="Type to search for device.."
          aria-label="Type to search for device.." />
      </div>

      <div *ngIf="isLoading()" class="loading"> Loading... </div>
      <div *ngIf="error()" class="error"> {{ error() }} </div>
      <div class="device-list">
        <div *ngFor="let device of devices()" class="device-item" (click)="selectDevice(device)"
          [class.selected]="selectedDevice() && selectedDevice().id === device.id">
          <div class="device-name">
            {{ device.name }}
          </div>
          <span class="device-badge"> Serial number: {{ device.id }} </span>
          <span class="device-badge"> | </span>
          <span class="device-badge"> Manufacturer: {{ device.manufacturer }} </span>
          <span class="device-badge"> | </span>
          <span class="device-badge"> RAM: {{ device.ram }} </span>
          <span class="device-badge"> | </span>
          <span class="device-badge"> Processor: {{ device.processor }} </span>

        </div>
      </div>

    </div>
    <div class="device-panel">
      <app-device-management [selectedDevice]="selectedDevice()" [user]="assignedUser()"
        (cancelled)="clearSelection()"></app-device-management>
    </div>
  </div>

</div>
