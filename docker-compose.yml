services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - default
  frontend:
    build:
      context: ./DeviceManagementSystem.AngularClient
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      add_mock_data:
        condition: service_completed_successfully
    networks:
      - default
    environment:
      ASPNETCORE_JWT__KEY: ${ASPNETCORE_JWT__KEY}
      ASPNETCORE_DATABASE__CONNECTIONSTRING: Server=database;Database=DeviceManagementDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      GEMINI_API_KEY: ${GEMINI_API_KEY}
  database:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: database
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - db_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - default
  init_db:
    image: mcr.microsoft.com/mssql-tools
    container_name: init_db
    depends_on:
      database:
        condition: service_healthy
    entrypoint: "/opt/mssql-tools/bin/sqlcmd -S database -U sa -P ${MSSQL_SA_PASSWORD} -i /init_db.sql"
    volumes:
      - ./scripts/init_db.sql:/init_db.sql
    networks:
      - default
  add_mock_data:
    image: mcr.microsoft.com/mssql-tools
    container_name: add_mock_data
    depends_on:
      init_db:
        condition: service_completed_successfully
    entrypoint: "/opt/mssql-tools/bin/sqlcmd -S database -U sa -P ${MSSQL_SA_PASSWORD} -i /add_mock_data.sql"
    volumes:
      - ./scripts/add_mock_data.sql:/add_mock_data.sql
    networks:
      - default

volumes:
  db_data:
    driver: local